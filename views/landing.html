<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wedding Landing Page</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="landing-page">
    <main class="landing-screen" style="background-image: linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.45)), url('{{background}}');">
      <div class="landing-card">
        <h1>Welcome</h1>
        <p>Choose one of the locations below.</p>
        <div class="landing-actions">
          <a class="action-button" href="{{btn1Url}}">{{btn1Label}}</a>
          <a class="action-button" href="{{btn2Url}}">{{btn2Label}}</a>
        </div>
      </div>
    </main>
  </body>
</html>
