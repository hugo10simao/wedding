<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vânia &amp; Hugo — Em Breve</title>
<meta name="robots" content="noindex, nofollow" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Playfair+Display:ital@1&display=swap');

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #efdbb0;
    color: #4a3018;
    font-family: 'Cinzel', serif;
  }

  body {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px;
  }

  .wrap {
    text-align: center;
    max-width: 440px;
  }

  .monogram {
    width: 96px;
    height: 96px;
    margin: 0 auto 28px;
    border-radius: 50%;
    border: 2px solid #b9863a;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .monogram::before {
    content: "";
    position: absolute;
    inset: -14px;
    border: 1.5px solid #c99a4e;
    border-radius: 50%;
    opacity: 0.5;
  }

  .monogram span {
    font-family: 'Playfair Display', Georgia, serif;
    font-style: italic;
    font-weight: 700;
    font-size: 34px;
    background: linear-gradient(180deg, #8a5a24 0%, #6b4118 60%, #4a2f10 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .eyebrow {
    font-size: 13px;
    letter-spacing: 0.35em;
    opacity: 0.75;
    margin-bottom: 10px;
  }

  h1 {
    font-family: 'Playfair Display', Georgia, serif;
    font-style: italic;
    font-weight: 400;
    font-size: 26px;
    line-height: 1.5;
    margin: 0 0 22px;
    color: #3b2611;
  }

  .divider {
    width: 60px;
    height: 1px;
    background: #b9863a;
    margin: 0 auto 22px;
    opacity: 0.7;
  }

  p {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    letter-spacing: 0.06em;
    line-height: 2;
    color: #5c3f22;
    margin: 0;
  }

  .date {
    display: inline-block;
    margin-top: 18px;
    padding: 12px 26px;
    border: 1.5px solid #b9863a;
    border-radius: 4px;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: #6b4118;
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="monogram"><span>VH</span></div>
    <div class="eyebrow">VÂNIA &amp; HUGO</div>
    <h1>Estamos a preparar tudo para este dia especial.</h1>
    <div class="divider"></div>
    <p>
      Os detalhes da cerimónia, da festa e todas as informações<br>
      úteis para o nosso grande dia estarão disponíveis brevemente.
    </p>
    <div class="date">DISPONÍVEL A PARTIR DE 1 DE JUNHO DE 2027</div>
  </div>
</body>
</html>
